# Otomatik sürüm yayınlama:
# main'e push gelince package.json'daki version okunur; o versiyonun GitHub
# release'i YOKSA installer derlenir ve release olarak yayınlanır. Kurulu
# uygulamalar (electron-updater) bir sonraki açılışta güncellemeyi alır.
#
# Yani güncelleme çıkarmak için tek gereken:
#   1) package.json'da "version"ı yükselt (örn. 1.0.0 -> 1.0.1)
#   2) git push
# Version yükseltilmeden yapılan push'lar hiçbir şey yayınlamaz (güvenli).
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bu versiyon zaten yayınlanmış mı?
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION zaten var, yayın atlanıyor."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION yeni, derlenip yayınlanacak."
          fi

      - name: Bağımlılıkları kur
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Derle ve yayınla
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
