<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    #cursor {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      align-items: flex-start;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-100px, -100px, 0);
      transition: opacity 80ms ease;
      will-change: transform;
    }
    #cursor.visible { opacity: 1; }
    svg {
      width: 30px;
      height: 34px;
      color: #080808;
      overflow: visible;
      filter: drop-shadow(0 1px 1px rgba(255,255,255,.98)) drop-shadow(0 2px 5px rgba(0,0,0,.72));
    }
    path { fill: currentColor; stroke: #fff; stroke-width: 1.7; stroke-linejoin: round; }
    #label {
      margin: 22px 0 0 -3px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 5px;
      background: rgba(5,8,14,.88);
      color: #fff;
      font: 600 11px/1.2 "Segoe UI", sans-serif;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
  </style>
</head>
<body>
  <div id="cursor" aria-hidden="true">
    <svg viewBox="0 0 28 32"><path d="M3 2.5v24.2l6.2-6 4.6 9.1 4.1-2.1-4.5-8.8h8.7L3 2.5z"></path></svg>
    <span id="label"></span>
  </div>
  <script>
    const cursor = document.getElementById('cursor');
    const label = document.getElementById('label');
    window.cursorOverlay.onUpdate((data) => {
      if (!data || !data.visible) {
        cursor.classList.remove('visible');
        return;
      }
      label.textContent = data.label || '';
      label.style.display = data.label ? 'block' : 'none';
      cursor.style.transform = `translate3d(${data.x - 3}px, ${data.y - 3}px, 0)`;
      cursor.classList.add('visible');
    });
  </script>
</body>
</html>
