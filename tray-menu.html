<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 10px;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      box-sizing: border-box;
      height: 100vh;
    }
    
    .menu-container {
      background: rgba(30, 31, 34, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .menu-item {
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .menu-item.danger:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <div class="menu-item" id="btn-show">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> 
      Uygulamayı Göster
    </div>
    <div class="divider"></div>
    <div class="menu-item danger" id="btn-quit">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
      Tamamen Çıkış Yap
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    document.getElementById('btn-show').addEventListener('click', () => {
      ipcRenderer.send('tray-action-show');
    });

    document.getElementById('btn-quit').addEventListener('click', () => {
      ipcRenderer.send('tray-action-quit');
    });
  </script>
</body>
</html>
